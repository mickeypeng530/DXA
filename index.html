  "appendix": [
    {"id": "A", "title": "骨質疏鬆症基礎", "content": "<p><strong>定義：</strong>一種讓骨骼強度減弱、增加骨折風險的疾病</p><ul><li>40歲後：骨密度每年 −0.5 ~ −1%</li><li>70歲後：每年 −1 ~ −2%</li></ul><p style=\"margin-top:8px;\"><strong>脆弱性骨折：</strong>低衝擊力下骨折（手腕、肱骨、骨盆、脊椎、髖骨）。車禍不算。</p>"},

    {"id": "C", "title": "T-Score 與 Z-Score", "content": "<div class=\"info-box blue\" style=\"font-family:monospace;font-size:0.88em;\">T = (受檢BMD − 年輕參考BMD) / 年輕參考SD<br>Z = (受檢BMD − 同齡參考BMD) / 同齡參考SD</div><table style=\"margin-top:10px;\"><tr><th>T-Score</th><th>診斷</th></tr><tr><td>≥ −1.0</td><td>正常</td></tr><tr><td>−1.0 ~ −2.5</td><td>低骨量（Low bone mass）</td></tr><tr><td>≤ −2.5</td><td>骨質疏鬆（Osteoporosis）</td></tr></table>"},

/* ══ Reset ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {

  height: 100%;
}

body {

<body data-theme="light" data-font="medium">

<!-- ══ Confirm Dialog ══ -->
<div class="overlay" id="confirmOverlay">

<header>

        <button class="ctrl-btn on" onclick="setFont('medium')">中</button>
        <button class="ctrl-btn" onclick="setFont('large')">大</button>
      </div>
      <button class="theme-btn" onclick="toggleTheme()" title="切換深色模式">🌙</button>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="nav-tab" onclick="showPage('teach')">教學</button>
    <button class="nav-tab" onclick="showPage('quiz')">測驗</button>
    <button class="nav-tab" onclick="showPage('extra')">附錄</button>
  </div>
</nav>

<!-- ══ Main Content - 由 JS 動態生成 ══ -->
<main>
  <div id="pg-teach" class="page active"></div>
  <div id="pg-quiz" class="page"></div>
  <div id="pg-extra" class="page"></div>
</main>

<!-- ══ Floating Buttons ══ -->
<button class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</button>
<button class="back-to-quiz" id="backToQuiz" onclick="backToQuiz()">← 返回測驗</button>

<!-- ══════════════════════════════════════════════════════════════
     🔧 JavaScript 邏輯區
═══════════════════════════════════════════════════════════════ -->
<script>
// ══ 讀取 JSON 資料 ══
const DATA = JSON.parse(document.getElementById('app-data').textContent);

// ══ 全域變數 ══
const LETTERS = ['A', 'B', 'C', 'D'];
let shuffledQuestions = [];
let cur = 0;
let results = [];
let userChoices = [];
let quizStarted = false;
let cameFromQuiz = false;
let returnToQuestion = 0;

// ══ 初始化 ══
document.addEventListener('DOMContentLoaded', function() {
  renderTeachPage();
  renderQuizPage();
  renderAppendixPage();
  showPage('teach');
  initTeachSections();
  window.addEventListener('scroll', handleScroll);
});

// ══ 渲染教學頁 ══
function renderTeachPage() {
  const container = document.getElementById('pg-teach');
  let html = '';
  
  // 快速跳轉
  html += '<div class="quick-nav card"><div class="qn-header">';
  html += '<div class="qn-label">快速跳轉</div>';
  html += '<button class="qn-cheatsheet-btn" onclick="toggleCheatsheet()">📋 速查</button></div>';
  
  // 速查內容
  html += '<div class="qn-cheatsheet" id="cheatsheet">';
  DATA.cheatsheet.forEach(section => {
    html += '<div class="cs-section"><div class="cs-title">【' + section.title + '】</div><div class="cs-content">';
    section.items.forEach(item => { html += '<span class="cs-item">' + item + '</span>'; });
    html += '</div></div>';
  });
  html += '</div>';
  
  // 三欄快速跳轉
  html += '<div class="qn-columns">';
  DATA.quickNav.forEach(col => {
    html += '<div class="qn-col">';
    html += '<div class="qn-col-title" onclick="jumpToSection(\'group-' + col.group + '\')">' + col.groupNum + '、' + col.groupTitle + '</div>';
    col.links.forEach(link => {
      html += '<a class="qn-link" href="#" onclick="jumpToSection(\'section-' + link.id + '\');return false;">' + link.label + '</a>';
    });
    html += '</div>';
  });
  html += '</div></div>';
  
  // 展開/收合按鈕（兩個獨立按鈕）
  html += '<div class="expand-controls"><button class="expand-btn" onclick="expandAll()">全部展開</button><button class="expand-btn" onclick="collapseAll()">全部收合</button></div>';
  
  // 教學區塊
  DATA.teachSections.forEach(section => {
    html += '<div class="teach-group-title" id="group-' + section.group + '" onclick="toggleSection(\'' + section.group + '\')">';
    html += '<span class="circ">' + section.groupNum + '</span><span class="group-text">' + section.groupTitle + '</span><span class="toggle-arrow">▼</span></div>';
    html += '<div class="teach-section" id="section-' + section.group + '">';
    section.cards.forEach(card => {
      html += '<div class="teach-card" id="section-' + card.id + '"><div class="teach-card-head">' + card.title + '</div>';
      html += '<div class="teach-card-body">' + card.content + '</div></div>';
    });
    html += '</div>';
  });
  
  container.innerHTML = html;
}

// ══ 渲染測驗頁 ══
function renderQuizPage() {
  const container = document.getElementById('pg-quiz');
  let html = '<div id="quiz-intro" class="card quiz-intro">';
  html += '<h2>DXA 操作實務測驗</h2>';
  html += '<p>情境題測試，檢驗你的 DXA 操作判斷力</p>';
  html += '<button class="start-btn" onclick="startQuiz()"><span>開始測驗</span><span>→</span></button></div>';
  html += '<div id="quiz-area" style="display:none;"></div>';
  html += '<div id="quiz-summary" class="card summary" style="display:none;"></div>';
  container.innerHTML = html;
}

// ══ 渲染附錄頁 ══
function renderAppendixPage() {
  const container = document.getElementById('pg-extra');
  let html = '<div class="card" style="margin-bottom:14px;">';
  html += '<div style="font-weight:900;color:var(--accent);font-size:calc(var(--font-size)*1.15);margin-bottom:6px;">附錄</div>';
  html += '<p style="color:var(--text2);font-size:0.92em;">補充教學內容，點擊展開</p></div>';
  DATA.appendix.forEach(item => {
    html += '<div class="acc"><button class="acc-btn" onclick="togAcc(this)"><span>' + item.id + '｜' + item.title + '</span><span class="arr">▼</span></button>';
    html += '<div class="acc-body">' + item.content + '</div></div>';
  });
  container.innerHTML = html;
}

// ══ 頁面切換 ══
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('pg-' + id).classList.add('active');
  document.querySelectorAll('.nav-tab')[['teach','quiz','extra'].indexOf(id)].classList.add('active');
  const backBtn = document.getElementById('backToQuiz');
  if (id === 'teach' && cameFromQuiz) backBtn.classList.add('visible');
  else { backBtn.classList.remove('visible'); if (id !== 'teach') cameFromQuiz = false; }
  window.scrollTo(0, 0);
}

// ══ 測驗邏輯 ══
function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  shuffledQuestions = shuffle(DATA.questions);
  results = new Array(shuffledQuestions.length).fill(null);
  userChoices = new Array(shuffledQuestions.length).fill(null);
  cur = 0;
  quizStarted = true;
  document.getElementById('quiz-intro').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  
  // 建立 quiz-area 的固定結構
  const area = document.getElementById('quiz-area');
  let html = '<div class="q-progress"><span id="qLabel">題目 1 / ' + shuffledQuestions.length + '</span><div class="progress-dots" id="dots">';
  for (let i = 0; i < shuffledQuestions.length; i++) {
    html += '<div class="dot' + (i === 0 ? ' current' : '') + '" id="dot-' + i + '" onclick="jumpToQ(' + i + ')"></div>';
  }
  html += '</div></div>';
  html += '<div id="q-container"></div>';
  html += '<div class="q-nav"><button class="q-nav-btn" id="prevBtn" onclick="navQ(-1)" disabled>← 上一題</button>';
  html += '<button class="q-nav-btn primary" id="nextBtn" onclick="navQ(1)">下一題 →</button></div>';
  area.innerHTML = html;
  
  renderQ(0);
}

function jumpToQ(idx) {
  if (idx >= 0 && idx < shuffledQuestions.length) {
    renderQ(idx);
  }
}

function renderQ(idx) {
  cur = idx;
  const q = shuffledQuestions[idx];
  const answered = results[idx] !== null;
  const QUIZ_COUNT = shuffledQuestions.length;
  
  let html = '<div class="q-card"><div class="q-badge">' + q.badge + '</div>';
  html += '<div class="q-scenario">' + q.scenario + '</div>';
  
  if (q.table) {
    html += '<table class="mini-table"><tr><th>椎體</th><th>T-Score</th></tr>';
    html += '<tr><td>L1</td><td>0.1</td></tr><tr><td>L2</td><td>0.3</td></tr>';
    html += '<tr><td>L3</td><td>−0.3</td></tr><tr><td>L4</td><td>−1.3</td></tr></table>';
  }
  
  if (q.images) {
    html += '<div class="img-row">';
    q.images.forEach(img => {
      html += '<div class="img-box"><img src="' + img.src + '" alt="' + img.cap + '"><div class="cap">' + img.cap + '</div></div>';
    });
    html += '</div>';
  }
  
  html += '<div class="q-text">' + q.question + '</div><div class="opts" id="opts">';
  
  const ansIdx = LETTERS.indexOf(q.answer);
  q.options.forEach((opt, i) => {
    let cls = 'opt';
    if (answered) {
      cls += ' locked';
      if (i === ansIdx) cls += ' is-correct';
      else if (results[idx] === false && i === userChoices[idx]) cls += ' is-wrong';
    }
    html += '<button class="' + cls + '" ' + (answered ? 'disabled' : '') + ' onclick="pick(' + idx + ',' + i + ')">';
    html += '<span class="letter">' + LETTERS[i] + '</span><span>' + opt + '</span></button>';
  });
  html += '</div>';
  
  // Feedback
  if (answered) {
    const ok = results[idx];
    html += '<div class="fb show ' + (ok ? 'ok' : 'nope') + '">' + q.feedback + '<br>';
    html += '<a class="go-link" href="#" onclick="goTeach(\'' + q.link + '\');return false;">📖 ' + q.linkText + '</a>';
    if (idx < QUIZ_COUNT - 1) {
      html += '<button class="skip-btn" onclick="navQ(1)">下一題 →</button>';
    }
    html += '</div>';
  }
  
  html += '</div>';
  document.getElementById('q-container').innerHTML = html;
  
  // Update label & dots
  document.getElementById('qLabel').textContent = '題目 ' + (idx + 1) + ' / ' + QUIZ_COUNT;
  for (let i = 0; i < QUIZ_COUNT; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.className = 'dot';
    if (i === idx) dot.classList.add('current');
    if (results[i] === true) dot.classList.add('done-correct');
    else if (results[i] === false) dot.classList.add('done-wrong');
  }
  
  // Nav buttons
  document.getElementById('prevBtn').disabled = (idx === 0);
  const nBtn = document.getElementById('nextBtn');
  if (idx === QUIZ_COUNT - 1 && results.every(r => r !== null)) {
    nBtn.textContent = '查看結果';
    nBtn.onclick = function() { showSummary(); };
    nBtn.disabled = false;
  } else {
    nBtn.textContent = '下一題 →';
    nBtn.onclick = function() { navQ(1); };
    nBtn.disabled = (idx === QUIZ_COUNT - 1);
  }
}

function pick(qIdx, optIdx) {
  if (results[qIdx] !== null) return;
  const q = shuffledQuestions[qIdx];
  const ansIdx = LETTERS.indexOf(q.answer);
  userChoices[qIdx] = optIdx;
  results[qIdx] = (optIdx === ansIdx);
  renderQ(qIdx);
  
  // 滾動到下一題按鈕可見
  setTimeout(function() {
    const nBtn = document.getElementById('nextBtn');
    if (nBtn) nBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
  
  // Check if all answered on last question
  const QUIZ_COUNT = shuffledQuestions.length;
  if (qIdx === QUIZ_COUNT - 1 && results.every(r => r !== null)) {
    const nBtn = document.getElementById('nextBtn');
    nBtn.textContent = '查看結果';
    nBtn.disabled = false;
    nBtn.onclick = function() { showSummary(); };
  }
}

function navQ(dir) {
  const next = cur + dir;
  const QUIZ_COUNT = shuffledQuestions.length;
  if (next >= 0 && next < QUIZ_COUNT) {
    renderQ(next);
    setTimeout(function() { window.scrollTo(0, 0); }, 50);
  }
}

function showSummary() {
  const correct = results.filter(r => r === true).length;
  const total = shuffledQuestions.length;
  const pct = correct / total;
  const msgs = ['加油！建議複習教學內容','還可以，再練習幾次！','不錯！','很好！','太厲害了！滿分！'];
  const mi = pct <= 0.5 ? 0 : pct <= 0.625 ? 1 : pct <= 0.75 ? 2 : pct < 1 ? 3 : 4;
  
  let html = '<h3>測驗完成</h3>';
  html += '<div class="score-circle"><div><span class="num">' + correct + '</span><span class="den"> / ' + total + '</span></div></div>';
  html += '<div class="msg">' + msgs[mi] + '</div>';
  
  const wrongs = results.map((r,i) => r === false ? i : -1).filter(i => i >= 0);
  if (wrongs.length > 0) {
    html += '<div class="wrong-review"><h4>答錯的題目：</h4>';
    wrongs.forEach(i => {
      const q = shuffledQuestions[i];
      html += '<div class="wr-item"><span style="color:var(--wrong);">✗</span><span>Q' + (i+1) + ' ' + q.badge + '</span>';
      html += '<a href="#" onclick="goTeach(\'' + q.link + '\');return false;">複習</a></div>';
    });
    html += '</div>';
  }
  
  html += '<button class="start-btn" style="margin-top:24px;" onclick="showConfirm()">重新作答</button>';
  
  document.getElementById('quiz-area').style.display = 'none';
  const s = document.getElementById('quiz-summary');
  s.innerHTML = html;
  s.style.display = 'block';
  s.scrollIntoView({behavior:'smooth', block:'start'});
}

// ══ 教學頁功能 ══
function toggleCheatsheet() {
  document.getElementById('cheatsheet').classList.toggle('open');
  document.querySelector('.qn-cheatsheet-btn').classList.toggle('active');
}

function jumpToSection(id) {
  // Determine which section contains this element
  let sectionName = null;
  if (id.includes('order')) sectionName = 'order';
  else if (id.includes('position')) sectionName = 'position';
  else if (id.includes('setting')) sectionName = 'setting';
  
  // Expand the section first
  if (sectionName) {
    expandSection(sectionName);
  }
  
  // Then scroll to the element (longer delay to ensure expansion complete)
  setTimeout(function() {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 150);
}

function toggleSection(group) {
  document.getElementById('group-' + group).classList.toggle('collapsed');
  document.getElementById('section-' + group).classList.toggle('collapsed');
  updateToggleAllBtn();
}

function expandSection(group) {
  document.getElementById('group-' + group).classList.remove('collapsed');
  document.getElementById('section-' + group).classList.remove('collapsed');
}

function collapseSection(group) {
  document.getElementById('group-' + group).classList.add('collapsed');
  document.getElementById('section-' + group).classList.add('collapsed');
}

function expandAll() {
  DATA.teachSections.forEach(s => expandSection(s.group));
}

function collapseAll() {
  DATA.teachSections.forEach(s => collapseSection(s.group));
}

function initTeachSections() {
  const isMobile = window.innerWidth <= 768;
  DATA.teachSections.forEach(s => { if (isMobile) collapseSection(s.group); else expandSection(s.group); });
}

function goTeach(sectionId) {
  cameFromQuiz = true;
  returnToQuestion = cur;
  showPage('teach');
  jumpToSection(sectionId);
}

function backToQuiz() {
  showPage('quiz');
  cameFromQuiz = false;
}

// ══ 附錄功能 ══
function togAcc(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

// ══ 設定功能 ══
function setFont(size) {
  document.body.setAttribute('data-font', size);
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
}

function toggleTheme() {
  const body = document.body;
  const btn = document.querySelector('.theme-btn');
  if (body.getAttribute('data-theme') === 'dark') {
    body.setAttribute('data-theme', 'light');
    btn.textContent = '🌙';
  } else {
    body.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  }
}

// ══ 對話框 ══
function showConfirm() { document.getElementById('confirmOverlay').classList.add('show'); }
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('show'); }
function confirmReset() {
  closeConfirm();
  document.getElementById('quiz-summary').style.display = 'none';
  document.getElementById('quiz-intro').style.display = 'block';
  document.getElementById('quiz-area').style.display = 'none';
  quizStarted = false;
}

// ══ 滾動相關 ══
function handleScroll() {
  document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 300);
}
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
</script>
